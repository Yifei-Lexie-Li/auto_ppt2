services:
  - type: web
    name: baishuishan-ppt-generator
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app_baishuishan_ppt_generator.py --server.port $PORT --server.address 0.0.0.0 --server.maxUploadSize 1024
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
